<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas — Search Inside YouTube Subtitles</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="/static/css/index.css" />
</head>
<body>
  <div class="home-page">
    <div class="home-bg" aria-hidden="true">
      <div class="home-bg-image"></div>
      <div class="home-bg-shade"></div>
      <div class="home-bg-grain"></div>

      <div class="petal petal-a"></div>
      <div class="petal petal-b"></div>
      <div class="petal petal-c"></div>
      <div class="petal petal-d"></div>
      <div class="petal petal-e"></div>
    </div>

    <header class="site-header">
      <a href="/" class="brand">
        <div class="brand-text">
          <span class="brand-title">ATLAS</span>
          <span class="brand-subtitle">Subtitle Search Engine</span>
        </div>
      </a>

      <nav class="top-nav">
        <a href="/results?q=Gemini" class="nav-link">Results</a>
        <a href="/library" class="nav-link">Library</a>
      </nav>
    </header>

    <main class="hero">
      <section class="hero-copy">
        <p class="hero-kicker">ATLAS</p>

        <h1 class="hero-title">
          From a keyword to a moment.
        </h1>

        <p class="hero-text">
          Follow a phrase, move directly to the second that matters, and surface the moment with AI.
        </p>

        <form id="search-form" class="search-panel">
          <div class="search-input-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M10.5 4a6.5 6.5 0 1 0 4.03 11.6l4.44 4.44 1.06-1.06-4.44-4.44A6.5 6.5 0 0 0 10.5 4Zm0 1.5a5 5 0 1 1 0 10a5 5 0 0 1 0-10Z"
                fill="currentColor"
              />
            </svg>

            <input
              id="search-input"
              class="search-input"
              type="text"
              placeholder="Search a phrase, topic, or spoken quote"
              autocomplete="off"
            />

            <button class="search-button" type="submit">Search</button>
          </div>

          <div class="search-controls">
            <div class="search-controls-left">
              <label class="exact-toggle">
                <input id="exact-search-toggle" type="checkbox" />
                <span>Exact phrase</span>
              </label>

              <select id="home-source-mode" class="home-scope-select" aria-label="Source scope">
                <option value="all">All sources</option>
                <option value="selected">Selected sources</option>
              </select>

              <button
                id="home-source-picker-btn"
                type="button"
                class="home-source-picker-btn"
                style="display: none;"
              >
                Choose sources
              </button>
            </div>

            <div class="search-hints">
              <span class="hints-label">Try</span>
              <button type="button" class="hint-chip" data-query="artificial intelligence">artificial intelligence</button>
              <button type="button" class="hint-chip" data-query="Gemini">Gemini</button>
              <button type="button" class="hint-chip" data-query="deepfake">deepfake</button>
            </div>
          </div>
        </form>
      </section>
    </main>

    <div id="home-source-modal" class="home-source-modal hidden" aria-hidden="true">
      <div id="home-source-modal-backdrop" class="home-source-modal-backdrop"></div>

      <div
        class="home-source-modal-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="home-source-modal-title"
      >
        <div class="home-source-modal-head">
          <div class="home-source-modal-copy">
            <div class="home-source-modal-kicker">Source filter</div>
            <h2 id="home-source-modal-title" class="home-source-modal-title">Choose sources for search</h2>
            <p class="home-source-modal-text">
              Select one or more library sources to narrow Atlas search results.
            </p>
          </div>

          <button
            id="home-source-modal-close"
            type="button"
            class="home-source-modal-close"
            aria-label="Close source chooser"
          >
            ×
          </button>
        </div>

        <div id="home-source-modal-body" class="home-source-modal-body"></div>

        <div class="home-source-modal-foot">
          <div id="home-source-modal-count" class="home-source-modal-count">0 selected</div>

          <div class="home-source-modal-actions">
            <button id="home-source-clear-btn" type="button" class="home-source-modal-btn">
              Clear
            </button>
            <button id="home-source-done-btn" type="button" class="home-source-modal-btn primary">
              Done
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/home.js"></script>
</body>
</html>
