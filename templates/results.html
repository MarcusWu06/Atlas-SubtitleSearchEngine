<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas — Results</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="/static/css/results.css" />
</head>
<body>
  <div class="results-page">
    <div class="results-bg" aria-hidden="true">
      <div class="results-bg-image"></div>
      <div class="results-bg-shade"></div>
      <div class="results-bg-grain"></div>
    </div>

    <header class="atlas-nav">
  <div class="atlas-nav-inner">
    <a href="/" class="atlas-nav-brand">
      <span class="atlas-nav-logo">ATLAS</span>
      <span class="atlas-nav-sub">Subtitle Search Engine</span>
    </a>

    <nav class="atlas-nav-menu" aria-label="Primary">
      <a href="/" class="atlas-nav-link">Home</a>
      <a href="/library" class="atlas-nav-link">Library</a>
      <a href="/about" class="atlas-nav-link">About</a>
    </nav>

    <div class="atlas-nav-tools">
      <button type="button" class="atlas-nav-orb" aria-label="Ambient mode">
        <span class="atlas-nav-orb-core"></span>
      </button>
    </div>
  </div>
</header>

    <main class="results-shell">
      <section class="results-head">
        <div class="results-head-copy">
          <p class="results-kicker">Search results</p>
          <h1 id="results-title" class="results-title">Loading results...</h1>
          <div id="results-meta" class="results-meta"></div>
        </div>

        <label class="exact-toggle">
          <input id="exact-search-toggle" type="checkbox" />
          <span>Exact phrase</span>
        </label>
      </section>

      <form id="results-search-form" class="results-search-bar">
        <input
          id="results-search-input"
          class="search-input compact"
          type="text"
          placeholder="Search subtitles"
          autocomplete="off"
        />
        <button class="search-button compact" type="submit">Search</button>
      </form>

      <div id="message-box" class="message-box hidden"></div>

      <nav id="pagination-top" class="pagination pagination-top"></nav>
      <section id="results-grid" class="results-grid"></section>
      <nav id="pagination" class="pagination"></nav>
    </main>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/static/js/results.js"></script>
</body>
</html>
